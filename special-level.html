<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special level</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'poppins',sans-serif;
            box-sizing: border-box;
        }
        .hero{
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg,#0e2c68,#8e1515);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;

        }
        .hero h1{
            font-size: 45px;
            font-weight: 600;
            margin-top: -50px;
            margin-bottom: 50px;
        }
        .hero h1 span{
            color: #ff2963;
        }
        textarea{
            width: 600px;
            height: 250px;
            background: #403d84;
            color: #fff;
            font-size: 15px;
            border: 0;
            outline: 0;
            padding: 20px;
            border-radius: 10px;
            resize: none;
            margin-bottom: 30px;
        }
        textarea::placeholder{
            font-size: 16px;
            color: #ddd;
        }
        .row{
            width: 600px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        button{
            background: #ff2963;
            color: #fff;
            font-size: 16px;
            padding: 10px 30px;
            border-radius: 35px;
            border: 0;
            outline: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        button img{
            width: 16px;
            margin-right: 10px;
        }
        select{
            flex:1;
            color: #fff;
            background: #403d84;
            height: 50px;
            padding: 0 20px;
            outline: 0;
            border: 0;
            border-radius: 35px;
            appearance: none;
            background-image: url(images/dropdown.png);
            background-repeat: no-repeat;
            background-size: 15px;
            background-position-x: calc(100% - 20px);
            background-position-y: 20px;
        }
        
        /* ========== FIXED MEDIA QUERIES ONLY ========== */
        @media (max-width: 782px) {
            .hero h1 {
                font-size: 35px;
                margin-top: -20px;
                margin-bottom: 30px;
                text-align: center;
                padding: 0 15px;
            }
            
            textarea {
                width: 90%;
                max-width: 500px;
                height: 220px;
            }
            
            .row {
                width: 90%;
                max-width: 500px;
                flex-direction: column;
                gap: 15px;
            }
            
            select {
                width: 100%;
                background-position-y: center;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px;
                margin-top: 0;
                margin-bottom: 25px;
            }
            
            textarea {
                width: 95%;
                height: 200px;
                font-size: 14px;
            }
            
            .row {
                width: 95%;
            }
            
            select {
                height: 45px;
                font-size: 14px;
            }
            
            button {
                padding: 8px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Text to speech <span>converter</span></h1>
        <textarea placeholder="Write anything here...."></textarea>
        <div class="row">
            <select></select>
            <button><img src="images/play.png">Listen</button>
        </div>
    </div>
<script>
    let speech = new SpeechSynthesisUtterance()

    let voices = []

    let voiceSelect = document.querySelector("select")

    window.speechSynthesis.onvoiceschanged = () =>{
        voices = window.speechSynthesis.getVoices()
        speech.voice = voices[0]

        voices.forEach((voice, i) => (voiceSelect.options[i]= new Option(voice.name, i)))
    }
    voiceSelect.addEventListener("change" , () =>{
        speech.voice = voices[voiceSelect.value]
    })

    document.querySelector("button").addEventListener("click",()=>{
        speech.text = document.querySelector("textarea").value
        window.speechSynthesis.speak(speech)
    })
</script>
</body>
</html>
