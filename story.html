<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Leila And The Wolf - Interactive Story</title>
    <link rel="icon" type="image/png" href="logo7.png">
    <style>
        :root {
            --width: 600px;  
            --height: 400px; 
            --bg-color: #2c3e50; 
            --page-color: #fff;  
            --speed: 1s;         
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* زر العودة */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .back-button:hover {
            background: #ffc107;
            color: #0a094e;
            transform: translateX(-5px);
        }

        /* --- تنسيق الكمبيوتر (الكتاب المفتوح) --- */
        @media (min-width: 769px) {
            body {
                perspective: 2500px;
                overflow: hidden;
                justify-content: flex-end;
                padding-right: 50px;
            }
            .book {
                width: var(--width);
                height: var(--height);
                position: relative;
                transform-style: preserve-3d;
                transition: transform 0.5s;
                cursor: grab;
                transform: rotateX(5deg) rotateY(-5deg); 
            }
            .page {
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0; left: 0;
                transform-origin: left center; 
                transform-style: preserve-3d;
                transition: transform var(--speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            }
            .front, .back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden; 
                background: var(--page-color);
                box-shadow: inset -3px 0px 20px rgba(0,0,0,0.1);
                border-radius: 4px;
            }
            .back { transform: rotateY(180deg); }
            .flipped { transform: rotateY(-180deg); }
        }

        /* --- تنسيق الموبايل (عرض عمودي) --- */
        @media (max-width: 768px) {
            body {
                overflow-y: auto; 
                display: block;
                padding: 60px 0 20px;
            }
            .back-button {
                top: 10px;
                left: 10px;
                padding: 6px 12px;
                font-size: 12px;
            }
            .book {
                width: 100%;
                display: flex;
                flex-direction: column; 
                align-items: center;
                padding: 20px 0;
            }
            .page {
                width: 90%; 
                margin-bottom: 0px;
                display: flex;
                flex-direction: column; 
            }
            .front, .back {
                width: 100%;
                height: auto;
                position: relative; 
                margin-bottom: 10px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                border-radius: 8px;
            }
            .back { transform: none !important; }
            .page-number { bottom: 10px !important; }
        }

        /* تنسيقات عامة */
        img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            border-radius: 4px;
        }

        .page-number {
            position: absolute;
            bottom: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
            font-weight: bold;
        }
        .front .page-number { right: 15px; }
        .back .page-number { left: 15px; }

        /* تلميح للاستخدام */
        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            .hint {
                display: none;
            }
        }
    </style>
</head>
<body>

    <a href="lesson-A1-reading.html" class="back-button">
        ← Back to Reading
    </a>

    <div class="hint">
        📖 Click on pages to flip | Drag to rotate
    </div>

    <div class="book" id="myBook">
        <!-- مجموعة الصفحات كاملة -->
        <div class="page flipped" onclick="flipPage(this)">
            <div class="front"><img src="images/0.png" alt="Page 1"><span class="page-number">1</span></div>
            <div class="back"><img src="images/1.png" alt="Page 2"><span class="page-number">2</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/2.png" alt="Page 3"><span class="page-number">3</span></div>
            <div class="back"><img src="images/3.png" alt="Page 4"><span class="page-number">4</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/4.png" alt="Page 5"><span class="page-number">5</span></div>
            <div class="back"><img src="images/5.png" alt="Page 6"><span class="page-number">6</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/6.png" alt="Page 7"><span class="page-number">7</span></div>
            <div class="back"><img src="images/7.png" alt="Page 8"><span class="page-number">8</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/8.png" alt="Page 9"><span class="page-number">9</span></div>
            <div class="back"><img src="images/9.png" alt="Page 10"><span class="page-number">10</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/10.png" alt="Page 11"><span class="page-number">11</span></div>
            <div class="back"><img src="images/11.png" alt="Page 12"><span class="page-number">12</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/12.png" alt="Page 13"><span class="page-number">13</span></div>
            <div class="back"><img src="images/13.png" alt="Page 14"><span class="page-number">14</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/14.png" alt="Page 15"><span class="page-number">15</span></div>
            <div class="back"><img src="images/15.png" alt="Page 16"><span class="page-number">16</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/16.png" alt="Page 17"><span class="page-number">17</span></div>
            <div class="back"><img src="images/17.png" alt="Page 18"><span class="page-number">18</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/18.png" alt="Page 19"><span class="page-number">19</span></div>
            <div class="back"><img src="images/19.png" alt="Page 20"><span class="page-number">20</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/20.png" alt="Page 21"><span class="page-number">21</span></div>
            <div class="back"><img src="images/21.png" alt="Page 22"><span class="page-number">22</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/22.png" alt="Page 23"><span class="page-number">23</span></div>
            <div class="back"><img src="images/23.png" alt="Page 24"><span class="page-number">24</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/24.png" alt="Page 25"><span class="page-number">25</span></div>
            <div class="back"><img src="images/25.png" alt="Page 26"><span class="page-number">26</span></div>
        </div>
    </div>

    <script>
        const book = document.getElementById('myBook');
        const pages = document.querySelectorAll('.page');

        function flipPage(clickedPage) {
            if (window.innerWidth > 768) {
                clickedPage.classList.toggle('flipped');
                updateZIndex();
            }
        }

        function updateZIndex() {
            if (window.innerWidth > 768) {
                pages.forEach((page, index) => {
                    page.style.zIndex = page.classList.contains('flipped') ? index + 1 : pages.length - index;
                });
            } else {
                pages.forEach(page => page.style.zIndex = "auto");
            }
        }

        let isDragging = false, startX, startY, rotateX = 5, rotateY = -5;
        
        document.addEventListener('mousedown', (e) => {
            if(window.innerWidth > 768 && e.target.tagName !== 'IMG' && e.target.tagName !== 'SPAN') {
                isDragging = true; 
                startX = e.pageX; 
                startY = e.pageY;
                book.style.cursor = 'grabbing';
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging || window.innerWidth <= 768) return;
            rotateY += (e.pageX - startX) * 0.4;
            rotateX -= (e.pageY - startY) * 0.4;
            
            // حدود للدوران لمنع الدوران الزائد
            rotateX = Math.min(30, Math.max(-15, rotateX));
            rotateY = Math.min(30, Math.max(-30, rotateY));
            
            book.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            startX = e.pageX; 
            startY = e.pageY;
        });
        
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                book.style.cursor = 'grab';
            }
        });
        
        // دعم اللمس للأجهزة اللوحية
        let touchStartX, touchStartY;
        
        book.addEventListener('touchstart', (e) => {
            if (window.innerWidth > 768 && e.touches.length === 1) {
                touchStartX = e.touches[0].pageX;
                touchStartY = e.touches[0].pageY;
            }
        });
        
        book.addEventListener('touchmove', (e) => {
            if (window.innerWidth > 768 && touchStartX !== undefined) {
                e.preventDefault();
                const deltaX = e.touches[0].pageX - touchStartX;
                const deltaY = e.touches[0].pageY - touchStartY;
                rotateY += deltaX * 0.4;
                rotateX -= deltaY * 0.4;
                
                rotateX = Math.min(30, Math.max(-15, rotateX));
                rotateY = Math.min(30, Math.max(-30, rotateY));
                
                book.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                touchStartX = e.touches[0].pageX;
                touchStartY = e.touches[0].pageY;
            }
        });
        
        book.addEventListener('touchend', () => {
            touchStartX = undefined;
            touchStartY = undefined;
        });

        updateZIndex();
        window.addEventListener('resize', updateZIndex);
        
        // معالج خطأ الصورة
        const images = document.querySelectorAll('img');
        images.forEach(img => {
            img.onerror = function() {
                this.src = 'https://via.placeholder.com/600x400?text=Page+Missing';
            };
        });
    </script>
</body>
</html>
