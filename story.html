<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leila And The Wolf</title>
    <style>
        :root {
            --width: 600px;  
            --height: 400px; 
            --bg-color: #2c3e50; 
            --page-color: #fff;  
            --speed: 1s;         
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- تنسيق الكمبيوتر (الكتاب المفتوح) --- */
        @media (min-width: 769px) {
            body {
                perspective: 2500px;
                overflow: hidden;
                justify-content: flex-end;
                padding-right: 50px;
            }
            .book {
                width: var(--width);
                height: var(--height);
                position: relative;
                transform-style: preserve-3d;
                transition: transform 0.5s;
                cursor: grab;
                transform: rotateX(5deg) rotateY(-5deg); 
            }
            .page {
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0; left: 0;
                transform-origin: left center; 
                transform-style: preserve-3d;
                transition: transform var(--speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            }
            .front, .back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden; 
                background: var(--page-color);
                box-shadow: inset -3px 0px 20px rgba(0,0,0,0.1);
            }
            .back { transform: rotateY(180deg); }
            .flipped { transform: rotateY(-180deg); }
        }

        /* --- تنسيق الموبايل (عرض عمودي) --- */
        @media (max-width: 768px) {
            body {
                overflow-y: auto; 
                display: block;   
            }
            .book {
                width: 100%;
                display: flex;
                flex-direction: column; 
                align-items: center;
                padding: 20px 0;
            }
            .page {
                width: 90%; 
                margin-bottom: 0px;
                display: flex;
                flex-direction: column; 
            }
            .front, .back {
                width: 100%;
                height: auto;
                position: relative; 
                margin-bottom: 10px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            }
            .back { transform: none !important; }
            .page-number { bottom: 10px !important; }
        }

        /* تنسيقات عامة */
        img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .page-number {
            position: absolute;
            bottom: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 10;
        }
        .front .page-number { right: 15px; }
        .back .page-number { left: 15px; }
    </style>
</head>
<body>

    <div class="book" id="myBook">
        <!-- مجموعة الصفحات كاملة -->
        <div class="page flipped" onclick="flipPage(this)">
            <div class="front"><img src="images/0.png" alt="1"><span class="page-number">1</span></div>
            <div class="back"><img src="images/1.png" alt="2"><span class="page-number">2</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/2.png" alt="3"><span class="page-number">3</span></div>
            <div class="back"><img src="images/3.png" alt="4"><span class="page-number">4</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/4.png" alt="5"><span class="page-number">5</span></div>
            <div class="back"><img src="images/5.png" alt="6"><span class="page-number">6</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/6.png" alt="7"><span class="page-number">7</span></div>
            <div class="back"><img src="images/7.png" alt="8"><span class="page-number">8</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/8.png" alt="9"><span class="page-number">9</span></div>
            <div class="back"><img src="images/9.png" alt="10"><span class="page-number">10</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/10.png" alt="11"><span class="page-number">11</span></div>
            <div class="back"><img src="images/11.png" alt="12"><span class="page-number">12</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/12.png" alt="13"><span class="page-number">13</span></div>
            <div class="back"><img src="images/13.png" alt="14"><span class="page-number">14</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/14.png" alt="15"><span class="page-number">15</span></div>
            <div class="back"><img src="images/15.png" alt="16"><span class="page-number">16</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/16.png" alt="17"><span class="page-number">17</span></div>
            <div class="back"><img src="images/17.png" alt="18"><span class="page-number">18</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/18.png" alt="19"><span class="page-number">19</span></div>
            <div class="back"><img src="images/19.png" alt="20"><span class="page-number">20</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/20.png" alt="21"><span class="page-number">21</span></div>
            <div class="back"><img src="images/21.png" alt="22"><span class="page-number">22</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/22.png" alt="23"><span class="page-number">23</span></div>
            <div class="back"><img src="images/23.png" alt="24"><span class="page-number">24</span></div>
        </div>

        <div class="page" onclick="flipPage(this)">
            <div class="front"><img src="images/24.png" alt="25"><span class="page-number">25</span></div>
            <div class="back"><img src="images/25.png" alt="26"><span class="page-number">26</span></div>
        </div>
    </div>

    <script>
        const book = document.getElementById('myBook');
        const pages = document.querySelectorAll('.page');

        function flipPage(clickedPage) {
            if (window.innerWidth > 768) {
                clickedPage.classList.toggle('flipped');
                updateZIndex();
            }
        }

        function updateZIndex() {
            if (window.innerWidth > 768) {
                pages.forEach((page, index) => {
                    page.style.zIndex = page.classList.contains('flipped') ? index + 1 : pages.length - index;
                });
            } else {
                pages.forEach(page => page.style.zIndex = "auto");
            }
        }

        let isDragging = false, startX, startY, rotateX = 5, rotateY = -5;
        document.addEventListener('mousedown', (e) => {
            if(window.innerWidth > 768 && e.target.tagName !== 'IMG') {
                isDragging = true; startX = e.pageX; startY = e.pageY;
            }
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging || window.innerWidth <= 768) return;
            rotateY += (e.pageX - startX) * 0.4;
            rotateX -= (e.pageY - startY) * 0.4;
            book.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            startX = e.pageX; startY = e.pageY;
        });
        document.addEventListener('mouseup', () => isDragging = false);

        updateZIndex();
        window.addEventListener('resize', updateZIndex);
    </script>
</body>
</html>
