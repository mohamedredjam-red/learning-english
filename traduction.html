<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>Language Translator | English Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" href="logo7.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <style>
        /* Import Google Font - Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #153677, #9e0909);
            padding: 20px;
        }
        
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-button:hover {
            background: #ffc107;
            color: #0a094e;
            transform: translateX(-5px);
        }
        
        .container{
            width: 100%;
            max-width: 690px;
            background: #fff;
            border-radius: 7px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .wrapper{
            border-radius: 5px;
            border: 1px solid #bbb;
        }
        
        .wrapper .text-input{
            display: flex;
            border-bottom: 1px solid #bbb;
        }
        
        .text-input .to-text{
            border-left: 1px solid #bbb;
        }
        
        .text-input textarea{
            height: 250px;
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 18px;
            border-radius: 5px;
            background: none;
            padding: 10px 15px;
        }
        
        .text-input textarea:focus {
            background: #f9f9f9;
        }
        
        .controls, li, .icons, .icons i{
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .controls{
            list-style: none;
            padding: 12px 15px;
        }
        
        .controls .row.from .icons{
            padding-right: 15px;
            border-right: 1px solid #bbb;
        }
        
        .controls .row.to .icons{
            padding-left: 15px;
            border-left: 1px solid #bbb;
        }
        
        .controls .icons{
            width: 38%;
        }
        
        .controls .icons i{
            width: 50px;
            color: #9f9f9f;
            font-size: 14px;
            cursor: pointer;
            justify-content: center;
            transition: 0.3s;
        }
        
        .controls .icons i:hover {
            color: #5372F0;
            transform: scale(1.1);
        }
        
        .controls .row select{
            border: none;
            outline: none;
            font-size: 18px;
            background: none;
            cursor: pointer;
        }
        
        .controls .exchange{
            color: #9f9f9f;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .controls .exchange:hover {
            color: #5372F0;
            transform: rotate(180deg);
        }
        
        .container button{
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            outline: none;
            cursor: pointer;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            border-radius: 5px;
            background: #5372F0;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .container button:hover {
            background: #4058c9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(83,114,240,0.3);
        }
        
        /* ========== MEDIA QUERIES ========== */
        @media (max-width: 768px) {
            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }
            
            .container {
                width: 100%;
                padding: 20px;
            }
            
            .text-input textarea {
                height: 200px;
                font-size: 16px;
            }
            
            .controls .row select {
                font-size: 14px;
            }
            
            .controls .icons i {
                width: 40px;
                font-size: 12px;
            }
        }

        @media (max-width: 600px) {
            .wrapper .text-input {
                flex-direction: column;
            }
            
            .text-input .to-text {
                border-left: none;
                border-top: 1px solid #bbb;
            }
            
            .text-input textarea {
                height: 160px;
                font-size: 15px;
            }
            
            .controls {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .controls .row {
                width: 45%;
            }
            
            .controls .exchange {
                order: 2;
            }
            
            .controls .row.from {
                order: 1;
            }
            
            .controls .row.to {
                order: 3;
            }
            
            .controls .icons {
                width: auto;
                gap: 5px;
            }
            
            .controls .icons i {
                width: 35px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .text-input textarea {
                height: 140px;
                font-size: 14px;
                padding: 8px 12px;
            }
            
            .controls {
                padding: 10px;
            }
            
            .controls .row {
                width: 100%;
                justify-content: space-between;
            }
            
            .controls .exchange {
                order: 4;
                margin: 10px auto;
            }
            
            .controls .icons {
                width: auto;
                gap: 10px;
            }
            
            .controls .row select {
                font-size: 13px;
                width: auto;
                min-width: 120px;
            }
            
            .controls .icons i {
                width: 30px;
                font-size: 11px;
            }
            
            .container button {
                padding: 12px;
                font-size: 15px;
                margin-top: 15px;
            }
        }

        @media (max-width: 380px) {
            .controls .row select {
                min-width: 100px;
                font-size: 12px;
            }
            
            .text-input textarea {
                height: 120px;
                font-size: 13px;
            }
        }
        
        /* رسالة التحميل */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a href="welcome.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back
    </a>
    
    <div class="container">
        <div class="wrapper">
            <div class="text-input">
                <textarea class="from-text" placeholder="Enter text to translate..."></textarea>
                <textarea class="to-text" placeholder="Translation will appear here..." readonly></textarea>
            </div>
            <ul class="controls">
                <li class="row from">
                    <div class="icons">
                        <i id="from" class="fas fa-volume-up" title="Listen to text"></i>
                        <i id="from" class="fas fa-copy" title="Copy text"></i>
                    </div>
                    <select id="fromLang">
                    </select>
                </li>
                <li class="exchange"><i class="fas fa-exchange-alt" title="Swap languages"></i></li>
                <li class="row to">
                    <select id="toLang">
                    </select>
                    <div class="icons">
                        <i id="to" class="fas fa-volume-up" title="Listen to translation"></i>
                        <i id="to" class="fas fa-copy" title="Copy translation"></i>
                    </div>
                </li>
            </ul>
        </div>
        <button id="translateBtn">
            <i class="fas fa-language"></i> Translate Text
        </button>
    </div>
    
    <script src="javaScript/countries.js"></script>
    <script>
        const fromText = document.querySelector(".from-text");
        const toText = document.querySelector(".to-text");
        const selectTag = document.querySelectorAll("select");
        const exchangeIcon = document.querySelector(".exchange");
        const translateBtn = document.getElementById("translateBtn");
        const icons = document.querySelectorAll(".row i");
        
        // التحقق من وجود ملف اللغات
        if (typeof countries === 'undefined') {
            console.error('countries.js not loaded!');
            fromText.placeholder = "⚠️ Error: Language file not loaded";
            toText.placeholder = "Please check the server";
        } else {
            // تعبئة قوائم اللغات
            selectTag.forEach((tag, id) => {
                for (const country_code in countries) {
                    let selected = ""; 
                    if (id == 0 && country_code == "en-GB") {
                        selected = "selected";
                    } else if (id == 1 && country_code == "ar-SA") {
                        selected = "selected";
                    }
                    
                    let option = `<option value="${country_code}" ${selected}>${countries[country_code]}</option>`;
                    tag.insertAdjacentHTML("beforeend", option); 
                }            
            });
        }
        
        // تبديل اللغات والنصوص
        exchangeIcon.addEventListener("click", () => {
            // تبديل النصوص
            let tempText = fromText.value;
            fromText.value = toText.value;
            toText.value = tempText;
            
            // تبديل اللغات المختارة في القوائم
            let tempLang = selectTag[0].value;
            selectTag[0].value = selectTag[1].value;
            selectTag[1].value = tempLang;
        });
        
        // وظيفة الترجمة
        translateBtn.addEventListener("click", () => {
            let text = fromText.value.trim();
            let translateFrom = selectTag[0].value;
            let translateTo = selectTag[1].value;
            
            if (!text) {
                toText.placeholder = "⚠️ Please enter text to translate";
                setTimeout(() => {
                    toText.placeholder = "Translation will appear here...";
                }, 2000);
                return;
            }
            
            translateBtn.disabled = true;
            translateBtn.innerHTML = '<span class="loading-spinner"></span> Translating...';
            
            let apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${translateFrom}|${translateTo}`;
            
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    let translatedText = data.responseData.translatedText;
                    // إزالة النص المكرر أحياناً من API
                    if (translatedText.includes('[Mymemory]')) {
                        translatedText = translatedText.split('[Mymemory]')[0].trim();
                    }
                    toText.value = translatedText;
                    translateBtn.disabled = false;
                    translateBtn.innerHTML = '<i class="fas fa-language"></i> Translate Text';
                })
                .catch(error => {
                    console.log("Error:", error);
                    toText.value = "Translation error. Please try again.";
                    translateBtn.disabled = false;
                    translateBtn.innerHTML = '<i class="fas fa-language"></i> Translate Text';
                });
        });
        
        // أيقونات النسخ والتحدث
        icons.forEach(icon => {
            icon.addEventListener("click", ({target}) => {
                if (target.classList.contains("fa-copy")) {
                    const textToCopy = target.id == "from" ? fromText.value : toText.value;
                    if (textToCopy) {
                        navigator.clipboard.writeText(textToCopy);
                        // إظهار رسالة تأكيد
                        const originalTitle = target.title;
                        target.title = "✓ Copied!";
                        setTimeout(() => {
                            target.title = originalTitle;
                        }, 1500);
                    }
                } else if (target.classList.contains("fa-volume-up")) {
                    const textToSpeak = target.id == "from" ? fromText.value : toText.value;
                    const lang = target.id == "from" ? selectTag[0].value : selectTag[1].value;
                    
                    if (textToSpeak) {
                        // إلغاء أي كلام قيد التشغيل
                        window.speechSynthesis.cancel();
                        let utterance = new SpeechSynthesisUtterance(textToSpeak);
                        utterance.lang = lang;
                        utterance.rate = 0.9;
                        window.speechSynthesis.speak(utterance);
                    }
                }
            });
        });
        
        // دعم Ctrl+Enter للترجمة
        fromText.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") {
                e.preventDefault();
                translateBtn.click();
            }
        });
        
        // رسالة ترحيبية في وحدة التحكم
        console.log('🌍 Language Translator Ready!');
    </script>
</body>
</html>
