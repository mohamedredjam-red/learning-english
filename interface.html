<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - English Platform</title>
    <link rel="icon" href="logo7.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                        url('images/333.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .navbar {
            background: rgba(10, 9, 78, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .logo-link {
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .logo-link:hover {
            transform: scale(1.05);
        }

        .logo-img {
            height: 55px;
            width: auto;
        }

        .logo-text {
            color: #ffc107;
            font-size: 22px;
            font-weight: bold;
            display: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a:hover {
            color: #ffc107;
            transform: translateY(-2px);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: white;
            font-size: 28px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #ffc107;
            color: #0a094e;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        input, select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: 2px solid #ffc107;
            transform: scale(1.01);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #ffc107;
            color: #0a094e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .guest-section {
            margin-top: 25px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 25px;
        }

        .guest-btn {
            background: transparent;
            color: white;
            border: 2px solid #ffc107;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .guest-btn:hover {
            background: #ffc107;
            color: #0a094e;
            transform: translateY(-2px);
        }

        .guest-note {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.3);
            color: #d4edda;
            border: 1px solid #28a745;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.3);
            color: #f8d7da;
            border: 1px solid #dc3545;
        }

        .demo-accounts {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 13px;
        }

        .demo-accounts p {
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .demo-accounts strong {
            color: #ffc107;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #ffc107;
            transform: translateX(-5px);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffc107;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ================= MEDIA QUERIES ================= */
        
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
            }
            
            .logo-img {
                height: 45px;
            }
            
            .container {
                padding: 25px;
                margin: 0 15px;
            }
            
            h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 550px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-img {
                height: 40px;
            }
            
            .nav-links {
                justify-content: center;
                gap: 15px;
            }
            
            .nav-links a {
                font-size: 14px;
            }
            
            .container {
                padding: 20px;
            }
            
            h2 {
                font-size: 22px;
            }
            
            .tab-btn {
                padding: 10px;
                font-size: 14px;
            }
            
            input, select {
                padding: 10px 10px 10px 35px;
                font-size: 14px;
            }
            
            .btn-submit, .guest-btn {
                padding: 12px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            .logo-img {
                height: 35px;
            }
            
            .container {
                padding: 15px;
            }
            
            h2 {
                font-size: 20px;
            }
            
            .demo-accounts {
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .container, .tab-content.active, .message {
                animation: none;
            }
            
            .btn-submit:hover:not(:disabled),
            .guest-btn:hover,
            .logo-link:hover,
            .nav-links a:hover {
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="logo-link">
            <img src="images/LOGO111.png" alt="Logo" class="logo-img" 
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="logo-text">📚 English Platform</span>
        </a>
        <div class="nav-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="about.html"><i class="fa-solid fa-info-circle"></i> About</a>
            <a href="#"><i class="fa-solid fa-envelope"></i> Contact</a>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h2><i class="fa-solid fa-language"></i> Welcome Back</h2>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
                <button class="tab-btn" onclick="switchTab('register')">
                    <i class="fa-solid fa-user-plus"></i> Register
                </button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label><i class="fa-solid fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="loginEmail" value="student@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" value="123456" required>
                        </div>
                    </div>
                    <button type="button" class="btn-submit" id="loginBtn" onclick="handleLogin()">
                        <i class="fa-solid fa-right-to-bracket"></i> Login
                    </button>
                </form>
                <div id="loginMessage" class="message"></div>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content">
                <form id="registerForm" onsubmit="return false;">
                    <div class="form-group">
                        <label><i class="fa-solid fa-user"></i> Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="regName" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="regEmail" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regPassword" minlength="6" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-check-circle"></i> Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-check-circle"></i>
                            <input type="password" id="regConfirm" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fa-solid fa-chart-line"></i> Level</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-chart-line"></i>
                            <select id="regLevel">
                                <option value="A">A - Beginner</option>
                                <option value="B">B - Intermediate</option>
                                <option value="C">C - Advanced</option>
                            </select>
                        </div>
                    </div>
                    <button type="button" class="btn-submit" id="registerBtn" onclick="handleRegister()">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div id="registerMessage" class="message"></div>
            </div>

            <!-- Guest Access Section -->
            <div class="guest-section">
                <button class="guest-btn" onclick="continueAsGuest()">
                    <i class="fa-solid fa-user-astronaut"></i> Continue as Guest
                </button>
                <p class="guest-note">
                    <i class="fa-solid fa-info-circle"></i> No account needed. Your progress won't be saved.
                </p>
            </div>

            <div class="demo-accounts">
                <p><strong><i class="fa-solid fa-flask"></i> Demo Accounts:</strong></p>
                <p><i class="fa-solid fa-envelope"></i> student@example.com / 123456</p>
                <p><i class="fa-solid fa-envelope"></i> teacher@example.com / 123456</p>
                <p><i class="fa-solid fa-envelope"></i> mohamed@gmail.com / 123456</p>
            </div>

            <div class="back-link">
                <a href="index.html">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // ========== API Base URL ==========
        const API_URL = 'http://localhost:5000/api';

        // ========== تبديل التبويبات ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
            
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('registerMessage').style.display = 'none';
        }

        // ========== تسجيل الدخول ==========
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            messageDiv.style.display = 'none';
            messageDiv.innerHTML = '';
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Logging in...';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('level', data.user.level);
                    localStorage.setItem('sessionId', data.session_id);
                    
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Login successful! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'welcome.html';
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ ' + data.message;
                    messageDiv.style.display = 'block';
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Connection error. Please make sure the server is running.';
                messageDiv.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
            }
        }

        // ========== تسجيل مستخدم جديد ==========
        async function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const level = document.getElementById('regLevel').value;
            const messageDiv = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            messageDiv.style.display = 'none';
            messageDiv.innerHTML = '';
            
            if (password !== confirm) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Passwords do not match';
                messageDiv.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span> Creating account...';
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, level })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('level', data.user.level);
                    localStorage.setItem('sessionId', data.session_id);
                    
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Account created! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'welcome.html';
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ ' + data.message;
                    messageDiv.style.display = 'block';
                    
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                }
            } catch (error) {
                console.error('Register error:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Connection error. Please try again.';
                messageDiv.style.display = 'block';
                
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        }

        // ========== الدخول كزائر ==========
        function continueAsGuest() {
            const guestId = 'guest_' + Date.now();
            const guestName = 'Guest User';
            const guestLevel = 'A';
            
            localStorage.setItem('userId', guestId);
            localStorage.setItem('userName', guestName);
            localStorage.setItem('userEmail', 'guest@example.com');
            localStorage.setItem('level', guestLevel);
            
            const loginMessage = document.getElementById('loginMessage');
            loginMessage.className = 'message success';
            loginMessage.innerHTML = '👤 Continuing as guest... Redirecting...';
            loginMessage.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'welcome.html';
            }, 500);
        }

        // ========== التحقق من تسجيل الدخول مسبقاً ==========
        if (localStorage.getItem('userId') && !localStorage.getItem('userId').startsWith('guest_')) {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ session_id: sessionId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.valid) {
                        window.location.href = 'welcome.html';
                    } else {
                        localStorage.clear();
                    }
                })
                .catch(() => {});
            } else {
                window.location.href = 'welcome.html';
            }
        }

        // ========== معالج خطأ الصورة ==========
        window.addEventListener('DOMContentLoaded', () => {
            const logoImg = document.querySelector('.logo-img');
            if (logoImg && logoImg.complete && logoImg.naturalWidth === 0) {
                logoImg.style.display = 'none';
                const textSpan = logoImg.nextElementSibling;
                if (textSpan) textSpan.style.display = 'block';
            }
        });
    </script>
</body>
</html>
